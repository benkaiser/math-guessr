<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Guessr — Sharpen Your Estimation Skills</title>
  <meta name="description" content="A GeoGuessr-inspired game for mental math estimation. Sharpen your back-of-the-envelope arithmetic skills.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
</head>
<body>
  <div class="app">

    <!-- ===== HOME SCREEN ===== -->
    <div class="screen active" id="screen-home">
      <div class="home-header">
        <div class="home-logo">🎯</div>
        <h1 class="home-title">Math Guessr</h1>
        <p class="home-tagline">Sharpen your estimation skills</p>
      </div>

      <div class="home-buttons">
        <button class="home-btn" id="btn-practice">
          <span class="home-btn-icon">🏋️</span>
          <div class="home-btn-text">
            <h3>Practice</h3>
            <p>Choose your difficulty and answer mode</p>
          </div>
        </button>

        <button class="home-btn" id="btn-daily">
          <span class="home-btn-icon">📅</span>
          <div class="home-btn-text">
            <h3>Daily Challenge <span id="daily-badge"></span></h3>
            <p id="daily-subtitle">5 questions, same for everyone</p>
          </div>
        </button>
      </div>
    </div>

    <!-- ===== SETTINGS SCREEN ===== -->
    <div class="screen" id="screen-settings">
      <div class="settings-header">
        <button class="back-btn" id="btn-back-settings">←</button>
        <h2>Practice Setup</h2>
      </div>

      <div class="settings-section">
        <h3>Difficulty</h3>
        <div class="difficulty-grid" id="difficulty-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="settings-section">
        <h3>Answer Mode</h3>
        <div class="mode-grid" id="mode-grid">
          <button class="mode-card selected" data-mode="free">
            <div class="mode-icon">⌨️</div>
            <div class="mode-label">Free Entry</div>
          </button>
          <button class="mode-card" data-mode="choice">
            <div class="mode-icon">🔘</div>
            <div class="mode-label">Multiple Choice</div>
          </button>
          <button class="mode-card" data-mode="slider">
            <div class="mode-icon">🎚️</div>
            <div class="mode-label">Slider</div>
          </button>
        </div>
      </div>

      <div class="settings-section">
        <h3>Questions Per Round</h3>
        <div class="count-selector" id="count-selector">
          <button class="count-btn" data-count="3">3</button>
          <button class="count-btn selected" data-count="5">5</button>
          <button class="count-btn" data-count="10">10</button>
          <button class="count-btn" data-count="15">15</button>
        </div>
      </div>

      <button class="start-btn" id="btn-start-practice">Start Round</button>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div class="screen" id="screen-game">
      <div class="game-topbar">
        <span class="game-progress" id="game-progress">1 / 5</span>
        <span class="game-score" id="game-score">0 pts</span>
      </div>

      <div class="timer-container">
        <div class="timer-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" class="timer-ring-bg" />
            <circle cx="40" cy="40" r="34" class="timer-ring-fill" id="timer-ring-fill" />
          </svg>
          <span class="timer-text" id="timer-text">30</span>
        </div>
      </div>

      <div class="question-display">
        <div class="question-expression" id="question-expression">347 × 82 = ?</div>
        <div class="question-hint" id="question-hint"></div>
      </div>

      <div class="answer-area" id="answer-area">
        <!-- Populated by JS based on answer mode -->
      </div>

      <div class="scratch-pad">
        <button class="scratch-toggle" id="scratch-toggle">📝 Scratch Pad</button>
        <div class="scratch-area" id="scratch-area">
          <textarea class="scratch-textarea" id="scratch-textarea"
                    placeholder="Rough working..."></textarea>
        </div>
      </div>
    </div>

    <!-- ===== RESULT SCREEN ===== -->
    <div class="screen" id="screen-result">
      <div class="result-screen">
        <div class="bullseye-container" id="bullseye"></div>
        <div class="result-feedback score-reveal" id="result-feedback">Bullseye!</div>
        <div class="result-numbers" id="result-numbers"></div>
        <div class="result-breakdown" id="result-breakdown"></div>
        <button class="next-btn" id="btn-next">Next Question →</button>
      </div>
    </div>

    <!-- ===== SUMMARY SCREEN ===== -->
    <div class="screen" id="screen-summary">
      <div class="summary-header">
        <div class="summary-grade score-reveal" id="summary-grade">A</div>
        <div class="summary-grade-label" id="summary-grade-label">🌟 Excellent</div>
        <div class="summary-total-score" id="summary-total-score">4,200 / 5,000 points</div>
      </div>

      <div class="summary-questions" id="summary-questions">
        <!-- Populated by JS -->
      </div>

      <div class="summary-actions">
        <button class="share-btn" id="share-btn" style="display:none">📋 Copy Results</button>
        <button class="secondary-btn" id="btn-play-again">Play Again</button>
        <button class="secondary-btn" id="btn-go-home">← Back to Home</button>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/questions.js"></script>
  <script src="js/daily-challenges.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
